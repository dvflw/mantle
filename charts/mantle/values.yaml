replicaCount: 1

image:
  repository: ghcr.io/dvflw/mantle
  tag: latest
  pullPolicy: IfNotPresent

database:
  # Direct Postgres connection string (ignored if existingSecret is set)
  url: ""
  # Name of an existing Kubernetes Secret containing the database URL
  existingSecret: ""
  # Key within the existing secret that holds the database URL
  secretKey: "url"

encryption:
  # Master encryption key for secrets management (ignored if existingSecret is set)
  key: ""
  # Name of an existing Kubernetes Secret containing the encryption key
  existingSecret: ""
  # Key within the existing secret that holds the encryption key
  secretKey: "key"

logLevel: info

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

podSecurityContext:
  runAsNonRoot: true

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

startupProbe:
  httpGet:
    path: /healthz
    port: http
  failureThreshold: 30
  periodSeconds: 2

serviceAccount:
  create: true
  # If not set, the fullname template is used
  name: ""

nodeSelector: {}

tolerations: []

affinity: {}

pdb:
  enabled: true
  minAvailable: 1

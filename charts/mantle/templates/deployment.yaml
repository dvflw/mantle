apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mantle.fullname" . }}
  labels:
    {{- include "mantle.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "mantle.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mantle.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "mantle.serviceAccountName" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: mantle
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command: ["mantle", "serve"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: MANTLE_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "mantle.databaseSecretName" . }}
                  key: {{ include "mantle.databaseSecretKey" . }}
            - name: MANTLE_API_ADDRESS
              value: ":8080"
            - name: MANTLE_LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
            {{- if or .Values.encryption.key .Values.encryption.existingSecret }}
            - name: MANTLE_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "mantle.encryptionSecretName" . }}
                  key: {{ include "mantle.encryptionSecretKey" . }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            {{- with .Values.startupProbe }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

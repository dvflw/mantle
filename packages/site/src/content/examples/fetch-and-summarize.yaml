name: fetch-and-summarize
description: Fetch data from an API and summarize it with an LLM

inputs:
  url:
    type: string
    description: URL to fetch

steps:
  - name: fetch-data
    action: http/request
    params:
      method: GET
      url: "{{ inputs.url }}"

  - name: summarize
    action: ai/completion
    credential: my-openai-key
    params:
      model: gpt-4o
      prompt: "Summarize this data in 2-3 sentences: {{ steps['fetch-data'].output.body }}"
      system_prompt: "You are a concise data summarizer."
      output_schema:
        type: object
        properties:
          summary:
            type: string
          key_points:
            type: array
            items:
              type: string
        required:
          - summary
          - key_points
        additionalProperties: false

  - name: post-result
    action: http/request
    if: "size(steps.summarize.output.json.key_points) > 0"
    params:
      method: POST
      url: https://jsonplaceholder.typicode.com/posts
      body:
        title: "Summary"
        body: "{{ steps.summarize.output.json.summary }}"

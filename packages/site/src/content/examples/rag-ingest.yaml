name: rag-ingest
description: >
  Ingest a document into a pgvector knowledge base: split it into overlapping
  chunks with text/chunk, embed them in one batch with ai/embed, and store them
  with kb/upsert. Pair with rag-ask.yaml. Requires the schema in
  rag-kb-schema.sql.

inputs:
  title:
    type: string
    description: "Document title (optional)"
    default: ""
  source:
    type: string
    description: "Where the document came from, e.g. a URL or file path (optional)"
    default: ""
  content:
    type: string
    description: The document text to chunk, embed, and store

steps:
  # 1. Split the document into overlapping chunks (defaults are chars; use
  #    unit: words for word counts).
  - name: chunk
    action: text/chunk
    params:
      text: "{{ inputs.content }}"
      chunk_size: 1200
      chunk_overlap: 150

  # 2. Embed all chunks in one call. output.vectors is an array of pgvector
  #    literals aligned with the chunks.
  - name: embed
    action: ai/embed
    credential: openai
    depends_on:
      - chunk
    timeout: "60s"
    params:
      model: text-embedding-3-small
      input: "{{ steps['chunk'].output.chunks }}"

  # 3. Store every chunk + embedding in one batch. The single `metadata` object
  #    is applied to every chunk. conflict_target dedupes on md5(content).
  - name: store
    action: kb/upsert
    credential: kb-db
    depends_on:
      - chunk
      - embed
    timeout: "30s"
    params:
      table: kb_documents
      contents: "{{ steps['chunk'].output.chunks }}"
      vectors: "{{ steps['embed'].output.vectors }}"
      metadata:
        title: "{{ inputs.title }}"
        source: "{{ inputs.source }}"
      conflict_target: dedupe_key

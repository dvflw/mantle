name: rag-ingest
description: >
  Embed a document with ai/embed and store it in a pgvector knowledge base with
  kb/upsert for semantic retrieval. Pair with rag-ask.yaml. Requires the schema
  in rag-kb-schema.sql. For long documents, split into chunks and pass arrays to
  ai/embed (input) and kb/upsert (contents/vectors).

inputs:
  title:
    type: string
    description: "Document title (optional)"
    default: ""
  source:
    type: string
    description: "Where the document came from, e.g. a URL or file path (optional)"
    default: ""
  content:
    type: string
    description: The document text to embed and store

steps:
  # 1. Produce an embedding. output.vector is a pgvector text literal that
  #    kb/upsert stores directly.
  - name: embed
    action: ai/embed
    credential: openai
    timeout: "30s"
    params:
      model: text-embedding-3-small
      input: "{{ inputs.content }}"

  # 2. Store the document, embedding, and metadata. conflict_target makes
  #    re-ingesting identical content a no-op (dedupe_key is md5(content)).
  - name: store
    action: kb/upsert
    credential: kb-db
    depends_on:
      - embed
    timeout: "15s"
    params:
      table: kb_documents
      content: "{{ inputs.content }}"
      vector: "{{ steps['embed'].output.vector }}"
      metadata:
        title: "{{ inputs.title }}"
        source: "{{ inputs.source }}"
      conflict_target: dedupe_key

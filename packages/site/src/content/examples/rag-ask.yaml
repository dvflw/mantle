name: rag-ask
description: >
  Retrieval-augmented generation over the pgvector knowledge base: embed the
  question, find the nearest documents by cosine distance, and have an LLM answer
  grounded in them. Pair with rag-ingest.yaml. Read the answer from the CLI
  output (mantle run rag-ask --input question="..." --output json).

inputs:
  question:
    type: string
    description: The question to answer from the knowledge base

steps:
  # 1. Embed the question with the same model used at ingest time.
  - name: embed-question
    action: ai/embed
    credential: openai
    timeout: "30s"
    params:
      model: text-embedding-3-small
      input: "{{ inputs.question }}"

  # 2. Nearest-neighbour search by cosine distance (<=> is pgvector's distance
  #    operator; similarity = 1 - distance).
  - name: search
    action: postgres/query
    credential: kb-db
    depends_on:
      - embed-question
    timeout: "15s"
    params:
      query: >
        SELECT title,
               source,
               content,
               1 - (embedding <=> $1::vector) AS similarity
        FROM kb_documents
        ORDER BY embedding <=> $1::vector
        LIMIT 5
      args:
        - "{{ steps['embed-question'].output.vector }}"

  # 3. Answer grounded strictly in the retrieved passages.
  - name: answer
    action: ai/completion
    credential: openai
    depends_on:
      - search
    timeout: "60s"
    params:
      model: gpt-4o
      system_prompt: >
        Answer using ONLY the provided context passages. Cite the titles you
        draw from. If the context does not contain the answer, say so plainly
        rather than guessing.
      prompt: >
        Question: {{ inputs.question }}

        Context passages (JSON, most similar first):
        {{ jsonEncode(steps['search'].output.rows) }}

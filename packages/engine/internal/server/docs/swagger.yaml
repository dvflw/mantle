basePath: /
definitions:
  budget.TeamBudget:
    properties:
      enforcement:
        description: '"hard" blocks execution when exceeded; "warn" logs only'
        type: string
      id:
        type: string
      monthly_token_limit:
        description: Maximum tokens allowed per billing period
        type: integer
      provider:
        description: AI provider name (e.g. "openai", "bedrock")
        type: string
      team_id:
        type: string
    required:
      - id
      - team_id
      - provider
      - monthly_token_limit
      - enforcement
    type: object
  server.CancelResponse:
    properties:
      execution_id:
        type: string
      status:
        type: string
    required:
      - execution_id
      - status
    type: object
  server.ErrorResponse:
    properties:
      error:
        type: string
    required:
      - error
    type: object
  server.ExecutionDetail:
    properties:
      completed_at:
        format: date-time
        type: string
      id:
        type: string
      started_at:
        format: date-time
        type: string
      status:
        type: string
      steps:
        items:
          $ref: '#/definitions/server.StepSummary'
        type: array
      version:
        type: integer
      workflow:
        type: string
    required:
      - id
      - workflow
      - version
      - status
      - steps
    type: object
  server.ExecutionListResponse:
    properties:
      executions:
        items:
          $ref: '#/definitions/server.ExecutionSummary'
        type: array
    required:
      - executions
    type: object
  server.ExecutionSummary:
    properties:
      completed_at:
        format: date-time
        type: string
      id:
        type: string
      started_at:
        format: date-time
        type: string
      status:
        type: string
      version:
        type: integer
      workflow:
        type: string
    required:
      - id
      - workflow
      - version
      - status
    type: object
  server.HealthResponse:
    properties:
      status:
        type: string
    required:
      - status
    type: object
  server.ReadyzResponse:
    properties:
      details:
        additionalProperties:
          type: string
        type: object
      status:
        type: string
    required:
      - status
    type: object
  server.RunResponse:
    properties:
      execution_id:
        type: string
      version:
        type: integer
      workflow:
        type: string
    required:
      - execution_id
      - workflow
      - version
    type: object
  server.SetBudgetRequest:
    properties:
      enforcement:
        description: '"hard" or "warn"'
        type: string
      monthly_token_limit:
        type: integer
    required:
      - monthly_token_limit
    type: object
  server.StatusResponse:
    properties:
      status:
        type: string
    required:
      - status
    type: object
  server.StepSummary:
    properties:
      completed_at:
        format: date-time
        type: string
      error:
        type: string
      name:
        type: string
      started_at:
        format: date-time
        type: string
      status:
        type: string
    required:
      - name
      - status
    type: object
  server.UsageResponse:
    properties:
      completion_tokens:
        type: integer
      period_start:
        format: date
        type: string
      prompt_tokens:
        type: integer
      provider:
        type: string
      total_tokens:
        type: integer
    required:
      - period_start
      - provider
      - prompt_tokens
      - completion_tokens
      - total_tokens
    type: object
  server.WorkflowDetailResponse:
    properties:
      definition:
        additionalProperties: true
        description: Free-form workflow definition as stored (YAML parsed to JSON)
        type: object
      name:
        type: string
      version:
        type: integer
    required:
      - name
      - version
      - definition
    type: object
  server.WorkflowListResponse:
    properties:
      workflows:
        items:
          $ref: '#/definitions/workflow.WorkflowSummary'
        type: array
    required:
      - workflows
    type: object
  server.WorkflowVersionListResponse:
    properties:
      name:
        type: string
      versions:
        items:
          $ref: '#/definitions/workflow.VersionSummary'
        type: array
    required:
      - name
      - versions
    type: object
  workflow.VersionSummary:
    properties:
      content_hash:
        type: string
      created_at:
        format: date-time
        type: string
      version:
        type: integer
    required:
      - version
      - content_hash
      - created_at
    type: object
  workflow.WorkflowSummary:
    properties:
      created_at:
        format: date-time
        type: string
      latest_version:
        type: integer
      name:
        type: string
      updated_at:
        format: date-time
        type: string
    required:
      - name
      - latest_version
      - created_at
      - updated_at
    type: object
info:
  contact:
    name: Mantle
    url: https://github.com/dvflw/mantle
  description: Headless AI workflow automation — BYOK, IaC-first, enterprise-grade.
  license:
    name: BSL 1.1
    url: https://github.com/dvflw/mantle/blob/main/LICENSE
  title: Mantle API
  version: "1.0"
paths:
  /api/v1/budgets:
    get:
      description: Returns the token budget configuration for all providers configured
        by the authenticated team.
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/budget.TeamBudget'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - OIDCAuth: []
      summary: List provider budgets
      tags:
      - budgets
  /api/v1/budgets/{provider}:
    delete:
      description: Removes the budget configuration for a provider. Does not affect
        in-flight executions.
      parameters:
      - description: Provider name
        in: path
        name: provider
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.StatusResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - OIDCAuth: []
      summary: Delete provider budget
      tags:
      - budgets
    put:
      consumes:
      - application/json
      description: Creates or replaces the monthly token budget for a provider. Enforcement
        "hard" blocks execution when the limit is reached; "warn" logs a warning only.
      parameters:
      - description: Provider name (e.g. openai, bedrock)
        in: path
        name: provider
        required: true
        type: string
      - description: Budget configuration
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/server.SetBudgetRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.StatusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - OIDCAuth: []
      summary: Set provider budget
      tags:
      - budgets
  /api/v1/budgets/usage:
    get:
      description: Returns token usage aggregated by provider for the current billing
        period (calendar month UTC).
      parameters:
      - description: Provider name; omit for total across all providers
        in: query
        name: provider
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.UsageResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - OIDCAuth: []
      summary: Get token usage
      tags:
      - budgets
  /api/v1/cancel/{execution}:
    post:
      description: Sends a cancellation signal to a running execution. The execution
        may not stop immediately; poll the status endpoint to confirm.
      parameters:
      - description: Execution ID (UUID)
        in: path
        name: execution
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.CancelResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - OIDCAuth: []
      summary: Cancel a running execution
      tags:
      - executions
  /api/v1/executions:
    get:
      description: Returns a list of workflow executions for the authenticated team,
        most recent first. Supports filtering by workflow name, status, and age. Use
        the limit parameter to cap results (default 20).
      parameters:
      - description: Filter by workflow name
        in: query
        name: workflow
        type: string
      - description: Filter by status
        enum:
        - pending
        - running
        - completed
        - failed
        - cancelled
        in: query
        name: status
        type: string
      - description: Filter by age (e.g. 1h, 7d)
        in: query
        name: since
        type: string
      - description: Max results (default 20)
        in: query
        name: limit
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.ExecutionListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - OIDCAuth: []
      summary: List executions
      tags:
      - executions
  /api/v1/executions/{id}:
    get:
      description: Returns full details of a single execution including all step results.
      parameters:
      - description: Execution ID (UUID)
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.ExecutionDetail'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - OIDCAuth: []
      summary: Get execution detail
      tags:
      - executions
  /api/v1/run/{workflow}:
    post:
      description: Triggers the latest applied version of the named workflow. Returns
        a 202 Accepted response with the new execution ID.
      parameters:
      - description: Workflow name
        in: path
        name: workflow
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/server.RunResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - OIDCAuth: []
      summary: Trigger a workflow execution
      tags:
      - executions
  /api/v1/workflows:
    get:
      description: Returns all workflow definitions ever applied by the authenticated
        team.
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.WorkflowListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - OIDCAuth: []
      summary: List workflow definitions
      tags:
      - workflows
  /api/v1/workflows/{name}:
    get:
      description: Returns the latest applied definition for a workflow.
      parameters:
      - description: Workflow name
        in: path
        name: name
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.WorkflowDetailResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - OIDCAuth: []
      summary: Get latest workflow definition
      tags:
      - workflows
  /api/v1/workflows/{name}/versions:
    get:
      description: Returns all historical versions of a workflow in reverse chronological
        order.
      parameters:
      - description: Workflow name
        in: path
        name: name
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.WorkflowVersionListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - OIDCAuth: []
      summary: List versions of a workflow
      tags:
      - workflows
  /api/v1/workflows/{name}/versions/{version}:
    get:
      description: Returns a specific historical version of a workflow definition.
      parameters:
      - description: Workflow name
        in: path
        name: name
        required: true
        type: string
      - description: Version number
        in: path
        name: version
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.WorkflowDetailResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - OIDCAuth: []
      summary: Get a specific workflow version
      tags:
      - workflows
  /healthz:
    get:
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.HealthResponse'
      summary: Liveness probe
      tags:
      - system
  /readyz:
    get:
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.ReadyzResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/server.ReadyzResponse'
      summary: Readiness probe
      tags:
      - system
securityDefinitions:
  ApiKeyAuth:
    description: 'Bearer API key. Format: "Bearer mk_..."'
    in: header
    name: Authorization
    type: apiKey
  OIDCAuth:
    description: 'Bearer OIDC JWT. Format: "Bearer <jwt>"'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"

version: 2

project_name: mantle

builds:
  - id: mantle
    main: ./cmd/mantle/
    binary: mantle
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/dvflw/mantle/internal/version.Version={{.Version}}
      - -X github.com/dvflw/mantle/internal/version.Commit={{.ShortCommit}}
      - -X github.com/dvflw/mantle/internal/version.Date={{.Date}}

archives:
  - id: default
    formats: ["tar.gz"]
    name_template: "mantle-{{ .Os }}-{{ .Arch }}"
    files:
      # Bundle the license so every distributed archive satisfies BUSL-1.1's
      # notice requirement. Path is relative to the goreleaser workdir
      # (packages/engine); LICENSE lives at the repo root.
      - src: "../../LICENSE"
        dst: "LICENSE"

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))?\!?:.*$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\(.+\))?\!?:.*$'
      order: 1
    - title: Other
      order: 999

dockers_v2:
  - ids: [mantle]
    dockerfile: Dockerfile.goreleaser
    images:
      - "ghcr.io/dvflw/mantle"
    tags:
      - "{{ .Version }}"
      # Floating tags (major.minor, major, latest) are only pushed for stable
      # releases. Empty template results are skipped by goreleaser, so these
      # evaluate to "" and are dropped for any pre-release version.
      - "{{ if not .Prerelease }}{{ .Major }}.{{ .Minor }}{{ end }}"
      - "{{ if not .Prerelease }}{{ .Major }}{{ end }}"
      - "{{ if not .Prerelease }}latest{{ end }}"

release:
  github:
    owner: dvflw
    name: mantle
  draft: false
  prerelease: auto

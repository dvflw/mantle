name: Site CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/site/**'
  pull_request:
    paths:
      - 'packages/site/**'

defaults:
  run:
    working-directory: packages/site

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build

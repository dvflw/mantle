name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set release variables
        id: vars
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=${COMMIT}" >> "$GITHUB_OUTPUT"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        env:
          CGO_ENABLED: '0'
          VERSION: ${{ steps.vars.outputs.version }}
          COMMIT: ${{ steps.vars.outputs.commit }}
          DATE: ${{ steps.vars.outputs.date }}
        run: |
          LDFLAGS="-s -w"
          LDFLAGS="${LDFLAGS} -X github.com/dvflw/mantle/internal/version.Version=${VERSION}"
          LDFLAGS="${LDFLAGS} -X github.com/dvflw/mantle/internal/version.Commit=${COMMIT}"
          LDFLAGS="${LDFLAGS} -X github.com/dvflw/mantle/internal/version.Date=${DATE}"

          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
          )

          mkdir -p dist

          for platform in "${platforms[@]}"; do
            IFS='/' read -r os arch <<< "${platform}"
            output="mantle-${os}-${arch}"
            echo "Building ${output}..."
            GOOS="${os}" GOARCH="${arch}" go build \
              -ldflags "${LDFLAGS}" \
              -o "dist/${output}" \
              ./cmd/mantle/
          done

      - name: Create tarballs and checksums
        run: |
          cd dist
          for binary in mantle-*; do
            tar czf "${binary}.tar.gz" "${binary}"
            rm "${binary}"
          done
          sha256sum *.tar.gz > checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes \
            dist/*.tar.gz \
            dist/checksums.txt
